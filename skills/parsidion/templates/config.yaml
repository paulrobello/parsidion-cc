# Parsidion vault Configuration
#
# Place at ~/ClaudeVault/config.yaml
# Values here override script defaults. CLI arguments override these values.
# Precedence: defaults → config.yaml → CLI args

# Session start hook (session_start_hook.py)
session_start_hook:
  ai_model: null           # Model for AI note selection (null = disabled)
  ai_cooldown_seconds: 30  # Skip nested claude -p if AI SessionStart ran recently for this vault
  ai_single_flight: true   # Allow only one nested claude -p SessionStart selector per vault at a time
  max_chars: 4000          # Max context injection characters
  ai_timeout: 25           # AI call timeout in seconds
  recent_days: 3           # Days to look back for recent notes
  debug: false             # Append injected context to debug log in system temp dir
  verbose_mode: false      # If true, inject full note summaries instead of the default compact one-line-per-note index
  use_embeddings: true     # Blend semantic matches into context; graceful fallback if db absent
  track_delta: true        # Show "Since last session" delta for new/updated notes (#10)

# Session stop hook (session_stop_hook.py)
session_stop_hook:
  ai_model: null           # Model for AI classification (null = disabled)
  ai_timeout: 25           # AI call timeout in seconds
  auto_summarize: true     # Auto-launch summarizer when pending entries exist
  auto_summarize_after: 1  # Queue threshold to trigger auto-summarizer (0 = always, 1 = default)
  transcript_tail_lines: 200      # Lines to inspect by default
  pi_transcript_tail_lines: 1000  # Deeper fallback tail for pi transcripts when no assistant text is found

# Subagent stop hook (subagent_stop_hook.py)
subagent_stop_hook:
  enabled: true            # Set false to disable subagent transcript capture entirely
  min_messages: 3          # Minimum assistant message count (pi transcripts default to 1 when unset)
  # Agent types to skip — these run constantly as vault system internals.
  # Value is a comma-separated string (config parser limitation).
  excluded_agents: "vault-explorer,research-agent"

# Pre-compact hook (pre_compact_hook.py)
pre_compact_hook:
  lines: 200               # Transcript lines to analyse

# Session summarizer (summarize_sessions.py)
summarizer:
  model: claude-sonnet-4-6
  max_parallel: 5          # Concurrent summarization tasks
  transcript_tail_lines: 400
  max_cleaned_chars: 12000
  persist: false           # SDK session persistence (for debugging)
  cluster_model: claude-haiku-4-5-20251001  # Model for hierarchical chunk summarization; used when a transcript exceeds max_cleaned_chars
  dedup_threshold: 0.80                    # Cosine similarity threshold for near-duplicate detection (0.0-1.0); set to 1.0 to disable
  rebuild_graph: false                     # Rebuild visualizer graph.json after indexing (same as --rebuild-graph CLI flag)
  graph_include_daily: false               # Include Daily notes in graph rebuild (same as --graph-include-daily CLI flag)

# Embeddings / semantic search (build_embeddings.py, vault_search.py)
embeddings:
  enabled: true                   # Set false to disable all embedding builds, note_index writes, and auto-rebuild after update_index.py runs
  model: BAAI/bge-small-en-v1.5  # ~67 MB ONNX model, cached after first run
  min_score: 0.45                 # Minimum cosine similarity for search results
  top_k: 10                       # Default result count for vault_search.py

# Git integration
git:
  auto_commit: true        # Auto-commit vault changes after writes

# Anthropic-compatible transport/env settings (optional)
# These keys mirror real env var names so you can copy values directly from
# env-based configs such as ~/.claude/glm-settings.json.
# Precedence: real environment variable > this config section.
anthropic_env:
  ANTHROPIC_API_KEY: null
  ANTHROPIC_AUTH_TOKEN: null
  ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
  ANTHROPIC_CUSTOM_HEADERS: null
  ANTHROPIC_DEFAULT_HAIKU_MODEL: GLM-5-TURBO
  ANTHROPIC_DEFAULT_SONNET_MODEL: GLM-5.1
  ANTHROPIC_DEFAULT_OPUS_MODEL: GLM-5.1
  API_TIMEOUT_MS: 3000000
  HTTPS_PROXY: null
  HTTP_PROXY: null

# Default model IDs — override once here instead of editing each script
defaults:
  haiku_model: claude-haiku-4-5-20251001   # Used by session hooks, vault_doctor repair
  sonnet_model: claude-sonnet-4-6          # Used by summarize_sessions.py

# Hook event log (session_start_hook.py, session_stop_hook.py, subagent_stop_hook.py)
event_log:
  enabled: true            # Write structured JSON events to hook_events.log (#1)
  path: null               # Override log path (null = ~/ClaudeVault/hook_events.log)

# Adaptive context tracking (#17) — derank notes never referenced by Claude
adaptive_context:
  enabled: false           # Track per-note usefulness; derank unreferenced notes over time
  decay_days: 30           # Days without reference before score decays

# Vault identity — used for per-user daily note filenames (team vault sharing)
vault:
  username: ""             # Username suffix for daily notes (DD-{username}.md). Defaults to $USER if blank.
